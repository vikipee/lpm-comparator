version: "3.8"
services:
  flask:
    build:
      context: ./flask-server
      dockerfile: Dockerfile    # or Dockerfile.flask if that's your file name
    ports:
      - "5000:5000"

  vite:
    build:
      context: ./vite-client/client
      dockerfile: Dockerfile    # or Dockerfile.vite
    ports:
      - "5173:5173"
